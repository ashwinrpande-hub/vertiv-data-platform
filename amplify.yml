version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd marketplace-ui/frontend
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: marketplace-ui/frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - marketplace-ui/frontend/node_modules/**/*
